<main class="max-w-5xl mx-auto px-4 py-12 relative">
        <div class="mb-8">
            <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Paramètres du profil</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-1">Gérez vos informations personnelles</p>
        </div>
        <div
            class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
            <div class="p-8">
                <div
                    class="flex flex-col md:flex-row items-center gap-8 pb-8 border-b border-slate-100 dark:border-slate-800">
                    <div class="relative group">
                        <div class="size-32 rounded-full border-4 border-primary/10 bg-slate-100 dark:bg-slate-800 bg-cover bg-center overflow-hidden"
                            data-alt="Aperçu de la photo de profil utilisateur"
                            style="background-image: url('{{ user()?.avatar }}');">
                        </div>
                    </div>
                </div>
                <form class="py-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Prénom</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
                            <input
                                class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-slate-100"
                                placeholder="Votre prénom" type="text" [value]="user()?.prenom" />
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Nom</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">badge</span>
                            <input
                                class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-slate-100"
                                placeholder="Votre nom" type="text" [value]="user()?.nom" />
                        </div>
                    </div>
                    <div class="space-y-2 md:col-span-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Adresse
                            Email</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
                            <input
                                class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-slate-100"
                                placeholder="email@exemple.com" type="email" [value]="user()?.email" />
                        </div>
                    </div>
                </form>
                <div
                    class="pt-6 border-t border-slate-100 dark:border-slate-800 flex flex-col sm:flex-row items-center justify-between gap-4">
                    <div class="flex gap-4 w-full sm:w-auto">
                        <button
                            class="flex-1 sm:flex-none px-6 py-2.5 text-slate-600 dark:text-slate-300 font-semibold hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                            <a routerLink="/acceuil">Retour à la page d'acceuil</a>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
