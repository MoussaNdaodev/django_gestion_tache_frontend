<main class="flex-1 flex flex-col items-center justify-center p-6 md:p-12">
  <div
    class="w-full max-w-2xl bg-white dark:bg-slate-900/50 rounded-xl shadow-xl border border-primary/5 overflow-hidden">
    <div class="flex flex-col md:flex-row h-full">
      <div class="flex-1 p-8 md:p-12">
        <div class="mb-8">
          <h1 class="text-3xl font-black text-slate-900 dark:text-white mb-2 tracking-tight">
            Inscription ESMT GESTION DE PROJET
          </h1>
          <p class="text-primary font-medium">
            Rejoignez la plateforme de gestion académique
          </p>
        </div>
        <form [formGroup]="registerForm" (ngSubmit)="submit()" class="space-y-5">
          <div class="grid grid-cols-2 gap-4 mb-6">
            <label
              class="relative flex flex-col items-center gap-2 p-4 rounded-lg border-2 border-primary/10 bg-background-light dark:bg-background-dark cursor-pointer hover:border-primary transition-all">
              <input type="radio" value="etudiant" formControlName="role"
                class="absolute top-2 right-2 text-primary focus:ring-primary h-4 w-4" />
              <span class="material-symbols-outlined text-primary text-3xl">
                person
              </span>
              <span class="text-sm font-bold">
                Étudiant
              </span>
            </label>
            <label
              class="relative flex flex-col items-center gap-2 p-4 rounded-lg border-2 border-primary/10 bg-background-light dark:bg-background-dark cursor-pointer hover:border-primary transition-all">
              <input type="radio" value="professeur" formControlName="role"
                class="absolute top-2 right-2 text-primary focus:ring-primary h-4 w-4" />
              <span class="material-symbols-outlined text-primary text-3xl">
                workspace_premium
              </span>
              <span class="text-sm font-bold">
                Professeur
              </span>
            </label>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="flex flex-col gap-2">
              <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">
                Nom
              </label>
              <input formControlName="nom" type="text" placeholder="Dupont"
                class="form-input rounded-lg border-primary/20 bg-background-light dark:bg-background-dark dark:border-primary/30 h-12 focus:border-primary focus:ring-primary transition-all" />
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">
                Prénom
              </label>
              <input formControlName="prenom" type="text" placeholder="Jean"
                class="form-input rounded-lg border-primary/20 bg-background-light dark:bg-background-dark dark:border-primary/30 h-12 focus:border-primary focus:ring-primary transition-all" />
            </div>
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">
              Email académique
            </label>
            <input formControlName="email" type="email" placeholder="jean.dupont@universite.fr"
              class="form-input rounded-lg border-primary/20 bg-background-light dark:bg-background-dark dark:border-primary/30 h-12 focus:border-primary focus:ring-primary transition-all" />
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">
              Mot de passe
            </label>
            <input formControlName="password" type="password" placeholder="••••••••"
              class="form-input rounded-lg border-primary/20 bg-background-light dark:bg-background-dark dark:border-primary/30 h-12 focus:border-primary focus:ring-primary transition-all" />
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">
              Photo de profil (Optionnel)
            </label>
            <div (click)="fileInput.click()"
              class="flex items-center gap-4 p-4 border-2 border-dashed border-primary/20 rounded-lg bg-background-light/50 dark:bg-background-dark/50 hover:bg-primary/5 transition-colors cursor-pointer">
              <div class="w-12 h-12 bg-primary/20 rounded-full flex items-center justify-center text-primary">
                <span class="material-symbols-outlined">
                  add_a_photo
                </span>
              </div>
              <div class="flex flex-col">
                <span class="text-xs font-bold text-slate-700 dark:text-slate-300">
                  Cliquez pour télécharger
                </span>
                <span class="text-[10px] text-slate-500">
                  JPG, PNG (max 2MB)
                </span>
              </div>
            </div>
            <input #fileInput type="file" accept="image/*" (change)="onFileSelected($event)" class="hidden" />
          </div>
          <div class="pt-4">
            <button type="submit" [disabled]="registerForm.invalid"
              class="w-full bg-primary text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all flex items-center justify-center gap-2 disabled:opacity-50">
              <span>
                Créer mon compte
              </span>
              <span class="material-symbols-outlined">
                arrow_forward
              </span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>
```
