<main class="flex-1 flex justify-center py-12 px-4 md:px-10">
  <div class="w-full max-w-3xl flex flex-col gap-8">
    <div class="flex flex-col gap-2">
      <nav class="flex text-sm text-slate-500 dark:text-slate-400 gap-2 items-center mb-2">
        <a class="hover:text-primary" routerLink="/projets">Mes Projets</a>
        <span class="material-symbols-outlined text-xs">chevron_right</span>
        <span class="text-slate-900 dark:text-slate-100 font-medium">Nouveau Projet</span>
      </nav>
      <h1 class="text-slate-900 dark:text-slate-100 text-3xl md:text-4xl font-black tracking-tight">
        Ajouter un Projet</h1>
      <p class="text-slate-600 dark:text-slate-400 text-base">Complétez les informations ci-dessous pour
        initialiser votre nouvel espace de travail académique.</p>
    </div>
    <div
      class="bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl shadow-sm p-6 md:p-10">
      <form class="flex flex-col gap-8" #monform="ngForm" (ngSubmit)="creerProjet(monform)">
        <!-- message erreur -->
        @if (erreur()) {
        <div class="p-4 rounded-lg bg-red-100 text-red-700 text-sm">
          {{ erreur() }}
        </div>
        }
        <div class="flex flex-col gap-6">
          <!-- titre -->
          <label class="flex flex-col gap-2">
            <span class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-wider">
              Titre du projet
            </span>

            <input
              class="form-input w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-background-dark focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-base transition-all"
              placeholder="Ex: Analyse de la biodiversité urbaine" type="text" name="titre" required
              [(ngModel)]="projet().titre" #titre="ngModel" />

            @if (titre.invalid && titre.touched) {
            <span class="text-red-500 text-sm">
              Le titre est obligatoire
            </span>
            }
          </label>
          <!-- description -->
          <label class="flex flex-col gap-2">
            <span class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-wider">
              Description détaillée
            </span>
            <textarea
              class="form-input w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-background-dark focus:border-primary focus:ring-1 focus:ring-primary min-h-[160px] p-4 text-base transition-all"
              placeholder="Décrivez les objectifs, les livrables attendus et le contexte académique..."
              name="description" required [(ngModel)]="projet().description" #description="ngModel"></textarea>
            @if (description.invalid && description.touched) {
            <span class="text-red-500 text-sm">
              La description est obligatoire
            </span>
            }
          </label>
          <!-- date -->
          <label class="flex flex-col gap-2">
            <span class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-wider">
              Date de fin prévue
            </span>
            <input
              class="form-input w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-background-dark focus:border-primary focus:ring-1 focus:ring-primary h-12 pl-4 pr-12 text-base transition-all"
              type="date" name="date_fin" required [(ngModel)]="projet().date_fin" #dateFin="ngModel" />
            @if (dateFin.invalid && dateFin.touched) {
            <span class="text-red-500 text-sm">
              La date est obligatoire
            </span>
            }
          </label>
          <!-- fichiers -->
          <div>
            <span
              class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-wider mb-2 inline-block">
              Ajouter des fichiers ou images
            </span>
            <div class="flex flex-col md:flex-row gap-4">
              <input type="file" multiple class="hidden" id="fichiersInput" (change)="onFichiersChange($event)">
              <label for="fichiersInput"
                class="flex items-center gap-2 px-4 py-2 rounded-lg bg-primary/5 text-primary hover:bg-primary text-sm font-bold cursor-pointer transition-all">
                <span class="material-symbols-outlined text-base">
                  attach_file
                </span>
                Ajouter des fichiers
              </label>
              <input type="file" multiple accept="image/*" class="hidden" id="imagesInput"
                (change)="onImagesChange($event)">
              <label for="imagesInput"
                class="flex items-center gap-2 px-4 py-2 rounded-lg bg-primary/5 text-primary hover:bg-primary text-sm font-bold cursor-pointer transition-all">
                <span class="material-symbols-outlined text-base">
                  image
                </span>
                Ajouter des images
              </label>
            </div>
          </div>
        </div>
        <!-- boutons -->
        <div
          class="flex flex-col-reverse md:flex-row items-center justify-end gap-4 pt-4 border-t border-slate-100 dark:border-slate-800">
          <button
            class="w-full md:w-auto px-8 py-3 rounded-lg text-slate-600 dark:text-slate-400 font-semibold hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
            type="reset">
            Annuler
          </button>
          <button
            class="w-full md:w-auto px-10 py-3 rounded-lg bg-primary text-white font-bold shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all flex items-center justify-center gap-2"
            type="submit" [disabled]="loading()">
            <span class="material-symbols-outlined text-xl">
              add_task
            </span>
            {{ loading() ? 'Création...' : 'Créer le projet' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</main>
