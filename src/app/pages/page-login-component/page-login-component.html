<main class="flex-grow flex items-center justify-center p-6 sm:p-12">
  <div class="w-full max-w-md">
    <div class="bg-white dark:bg-slate-900/50 rounded-xl shadow-xl border border-primary/5 overflow-hidden">
      <div class="h-32 bg-gradient-to-br from-primary/20 to-primary/5 relative flex items-center justify-center">
        <div class="absolute inset-0 opacity-20"
          style="background-image: radial-gradient(circle at 2px 2px, #1b8859 1px, transparent 0); background-size: 24px 24px;">
        </div>
        <div class="relative z-10 text-center">
          <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Bon retour !</h2>
          <p class="text-sm text-primary/80 font-medium">Accédez à vos projets académiques</p>
        </div>
      </div>
      <div class="p-8">
        <form class="space-y-6" #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
          <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="email">Email
              professionnel ou étudiant</label>
            <div class="relative group">
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                <span class="material-symbols-outlined text-lg">mail</span>
              </div>
              <input
                class="block w-full pl-10 pr-3 py-3 border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all sm:text-sm"
                id="email" name="email" placeholder="moussa.ndao@esmt.sn" type="email" [(ngModel)]="user.email" />
            </div>
          </div>
          <div class="space-y-2">
            <div class="flex items-center justify-between">
              <label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Mot de
                passe</label>
            </div>
            <div class="relative group">
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                <span class="material-symbols-outlined text-lg">lock</span>
              </div>
              <input
                class="block w-full pl-10 pr-10 py-3 border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all sm:text-sm"
                id="password" name="password" placeholder="••••••••" type="password" [(ngModel)]="user.password" />
            </div>
          </div>
          <button
            class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all active:scale-[0.98]"
            type="submit">
            Se connecter
          </button>
        </form>
        <p class="mt-8 text-center text-sm text-slate-600 dark:text-slate-400">
          Pas encore de compte ?
          <a class="font-bold text-primary hover:underline transition-all" routerLink="/auth/register">Créer un
            compte</a>
        </p>
      </div>
    </div>
  </div>
</main>
