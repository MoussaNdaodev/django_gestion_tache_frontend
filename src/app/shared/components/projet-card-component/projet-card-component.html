<div
  class="flex flex-col bg-white dark:bg-slate-900 rounded-xl overflow-hidden shadow-sm hover:shadow-md border border-primary/5 transition-all group">
  <div class="h-40 w-full bg-center bg-no-repeat bg-cover relative" data-alt="Design d'interface utilisateur e-commerce"
    style='background-image: url("{{ projet()?.images || "https://via.placeholder.com/400x300" }}")'>
  </div>
  <div class="p-5 flex flex-col gap-4 flex-1">
    <div>
      <h3
        class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-snug group-hover:text-primary transition-colors">
        {{ projet()?.titre }}</h3>
      <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 line-clamp-2">{{ projet()?.description }}</p>
    </div>
    <div class="flex flex-col gap-2 pt-2 border-t border-slate-50 dark:border-slate-800">
      <div class="flex items-center gap-2 text-slate-600 dark:text-slate-400 text-xs">
        <span class="material-symbols-outlined text-sm text-primary">calendar_month</span>
        <span>Échéance: <strong>{{ projet()?.date_fin| date:'dd MMM yyyy' }}</strong></span>
      </div>

    </div>
    <div class="mt-auto">
      <button
        class="w-full flex items-center justify-center gap-2 py-2.5 rounded-lg bg-primary/5 text-primary hover:bg-primary text-sm font-bold transition-all hover:text-white">
        <a routerLink="/projets/{{ projet()?.id }}">Voir les détails</a>
        <span class="material-symbols-outlined text-base">arrow_forward</span>
      </button>
    </div>
  </div>
</div>
